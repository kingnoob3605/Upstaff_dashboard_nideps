# netlify.toml — Upstaff Dashboard deployment config

[[headers]]
  for = "/*"
  [headers.values]
    # Allow Google OAuth popup to call window.opener (required for Calendar sync)
    # "same-origin-allow-popups" lets popups opened by this page communicate back.
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Embedder-Policy = "unsafe-none"
